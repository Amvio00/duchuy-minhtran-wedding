<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đức Huy & Minh Trân Wedding</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #7a2b2d;
            --moss-green: #6b705c;
            --glass-white: rgba(255, 255, 255, 0.7);
            --gold-line: #c4a484;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: #fdfbf7;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- 1. MÀN HÌNH CHÀO (OVERLAY) --- */
        #wedding-overlay {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
            background-image: url('anhbia.jpg'); 
            background-size: cover;
            background-position: center;
            transition: opacity 1.2s ease, transform 1.2s ease;
        }

        .main-card {
            width: 85%; max-width: 420px;
            padding: 10px; border: 1px solid var(--gold-line);
            border-radius: 25px; box-shadow: 0 15px 45px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.1);
        }

        .glass-content {
            background: var(--glass-white);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 40px 20px; border-radius: 20px; text-align: center;
        }

        .names-overlay {
            font-family: 'Great Vibes', cursive;
            font-size: 3.2rem; color: #2d3826; 
            margin: 5px 0; line-height: 1.1;
        }

        .guest-box {
            background: rgba(122, 43, 45, 0.12);
            color: var(--primary-dark);
            padding: 10px 20px; border-radius: 30px;
            display: inline-block; font-weight: 700;
            margin: 15px 0; min-width: 160px;
        }

        .btn-open {
            background-color: var(--primary-dark);
            color: white; border: none;
            padding: 14px 55px; border-radius: 30px;
            font-size: 1rem; cursor: pointer;
            box-shadow: 0 5px 15px rgba(122, 43, 45, 0.4);
            margin-top: 10px; transition: transform 0.3s;
        }

        .btn-open:active { transform: scale(0.95); }

        /* --- 2. CÁNH HOA & NHẠC --- */
        #petal-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 9999;
        }

        .music-note-wrapper {
            position: fixed; bottom: 25px; right: 25px;
            z-index: 9000; width: 45px; height: 45px;
            background: white; border: 1px solid var(--moss-green);
            border-radius: 50%; display: none; /* Hiện sau khi mở */
            align-items: center; justify-content: center; cursor: pointer;
        }
        .spinning { animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- 3. NỘI DUNG THIỆP CHÍNH --- */
        #main-invitation {
            display: none; opacity: 0;
            transition: opacity 1.5s ease;
        }

        /* Phần Lịch */
        .calendar-container {
            max-width: 400px; margin: 50px auto;
            background: white; padding: 20px;
            border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            text-align: center;
        }
        .img-top-calendar { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        .cal-header { position: relative; height: 80px; }
        .cal-year { font-size: 4rem; color: #f0f0f0; position: absolute; width: 100%; top: 0; z-index: 1; font-weight: 800; }
        .cal-month { font-family: 'Great Vibes'; font-size: 2.5rem; color: var(--moss-green); position: relative; z-index: 2; padding-top: 20px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px; }
        .weekday { font-weight: 700; color: var(--moss-green); font-size: 0.8rem; }
        .date { font-size: 0.9rem; padding: 5px; color: #555; }
        .active { background: var(--moss-green); color: white; border-radius: 50%; font-weight: bold; }

        .stage-exit { opacity: 0 !important; pointer-events: none; transform: translateY(-50px); }
    </style>
</head>
<body style="overflow: hidden;"> <!-- Khóa cuộn lúc đầu -->

    <canvas id="petal-canvas"></canvas>

    <!-- AUDIO -->
    <audio id="weddingMusic" loop>
        <source id="musicSource" type="audio/mpeg">
    </audio>

    <!-- OVERLAY -->
    <div id="wedding-overlay">
        <div class="main-card" data-aos="zoom-in">
            <div class="glass-content">
                <p style="letter-spacing: 3px; font-size: 0.7rem; color: #666;">WEDDING INVITATION</p>
                <div class="names-overlay">Đức Huy</div>
                <div style="font-family: 'Great Vibes'; font-size: 1.5rem; color: var(--gold-line);">&</div>
                <div class="names-overlay">Minh Trân</div>
                
                <p style="font-size: 0.8rem; font-weight: 600; margin-top: 20px;">THÂN MỜI</p>
                <div class="guest-box" id="guest-name-overlay">Quý Khách</div>
                <br>
                <button class="btn-open" onclick="openWedding()">Mở thiệp</button>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main-invitation">
        <div id="musicControl" class="music-note-wrapper">
            <div id="musicIcon" class="music-note spinning" style="font-size: 20px; color: var(--moss-green);">♫</div>
        </div>

        <section style="padding: 80px 20px; text-align: center;">
            <div data-aos="fade-up">
                <p style="letter-spacing: 5px; color: var(--moss-green);">TRÂN TRỌNG KÍNH MỜI</p>
                <h2 id="guest-name-main" style="font-family: 'Great Vibes'; font-size: 3rem; color: var(--primary-dark);">Quý Khách</h2>
                <p style="line-height: 1.8;">Đến dự buổi tiệc chung vui cùng gia đình chúng tôi tại...</p>
            </div>

            <!-- PHẦN LỊCH -->
            <div class="calendar-container" data-aos="fade-up">
                <img src="anhganthiep.webp" class="img-top-calendar" alt="Wedding">
                <div class="cal-header">
                    <div class="cal-year">2026</div>
                    <div class="cal-month">May</div>
                </div>
                <div class="cal-grid">
                    <div class="weekday">T2</div><div class="weekday">T3</div><div class="weekday">T4</div><div class="weekday">T5</div><div class="weekday">T6</div><div class="weekday">T7</div><div class="weekday">CN</div>
                    <!-- Tháng 5/2026 bắt đầu từ Thứ 6 -->
                    <div></div><div></div><div></div><div></div>
                    <div class="date">1</div><div class="date">2</div><div class="date">3</div>
                    <div class="date">4</div><div class="date">5</div><div class="date">6</div><div class="date">7</div><div class="date">8</div><div class="date active">9</div><div class="date">10</div>
                    <div class="date">11</div><div class="date">12</div><div class="date">13</div><div class="date">14</div><div class="date">15</div><div class="date">16</div><div class="date">17</div>
                    <div class="date">18</div><div class="date">19</div><div class="date">20</div><div class="date">21</div><div class="date">22</div><div class="date">23</div><div class="date">24</div>
                    <div class="date">25</div><div class="date">26</div><div class="date">27</div><div class="date">28</div><div class="date">29</div><div class="date">30</div><div class="date">31</div>
                </div>
            </div>

            <div style="height: 500px;">
                <p data-aos="fade-up">Cảm ơn bạn rất nhiều!</p>
            </div>
        </section>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // 1. TÊN KHÁCH TỪ LINK
        const urlParams = new URLSearchParams(window.location.search);
        const guestName = urlParams.get('to') || "Quý Khách";
        document.getElementById('guest-name-overlay').innerText = guestName;
        document.getElementById('guest-name-main').innerText = guestName;

        // 2. NHẠC NGẪU NHIÊN
        const songs = ['nhac1.mp3', 'nhac2.mp3', 'nhac3.mp3'];
        const audio = document.getElementById('weddingMusic');
        document.getElementById('musicSource').src = songs[Math.floor(Math.random() * songs.length)];
        audio.load();

        // 3. MỞ THIỆP
        function openWedding() {
            audio.play();
            document.getElementById('wedding-overlay').classList.add('stage-exit');
            document.getElementById('main-invitation').style.display = 'block';
            document.getElementById('musicControl').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('main-invitation').style.opacity = '1';
                document.body.style.overflow = 'auto';
                document.getElementById('wedding-overlay').style.display = 'none';
                AOS.init({ duration: 1000, once: true });
            }, 1000);
        }

        // TẮT/MỞ NHẠC
        document.getElementById('musicControl').addEventListener('click', function(e) {
            e.stopPropagation();
            if (audio.paused) {
                audio.play();
                document.getElementById('musicIcon').classList.add('spinning');
            } else {
                audio.pause();
                document.getElementById('musicIcon').classList.remove('spinning');
            }
        });

        // 4. CÁNH HOA RƠI
        const canvas = document.getElementById('petal-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, petals = [];
        function initCanvas() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', initCanvas); initCanvas();

        class Petal {
            constructor() {
                this.x = Math.random() * w; this.y = Math.random() * h - h;
                this.size = Math.random() * 7 + 5; this.speed = Math.random() * 1 + 1;
                this.angle = Math.random() * 360; this.spin = Math.random() * 2 - 1;
            }
            update() {
                this.y += this.speed; this.angle += this.spin;
                if (this.y > h) { this.y = -20; this.x = Math.random() * w; }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle * Math.PI / 180);
                ctx.beginPath(); ctx.ellipse(0, 0, this.size, this.size/1.5, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 183, 197, 0.6)'; ctx.fill(); ctx.restore();
            }
        }
        for (let i = 0; i < 35; i++) petals.push(new Petal());
        function animate() { ctx.clearRect(0, 0, w, h); petals.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();

        // Khởi tạo AOS cho overlay
        AOS.init();
    </script>
</body>
</html>
