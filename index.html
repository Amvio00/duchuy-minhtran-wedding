<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Minh Trân & Đức Huy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fdfaf7;
            --moss-green: #2d3e2d; 
            --metallic-gold: #d4af37; 
            --gold-light: #fff3d6;
            --gold-shadow: #8a6d3b;
            --text-dark: #333;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- PHẦN 1: HERO --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            padding-top: 10vh;
            align-items: center;
            text-align: center;
            position: relative;
            background: url('anhnen1.jpg') no-repeat center center/cover;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.15); 
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 90%; 
        }

        .main-title {
            font-family: 'Great Vibes', cursive;
            color: var(--metallic-gold);
            margin: 5px 0;
            line-height: 1.2;
            text-shadow: 0px 1px 0px var(--gold-light), 0px 2px 0px var(--gold-shadow), 1px 4px 6px rgba(0,0,0,0.3);
            font-size: clamp(2.2rem, 8vw, 5rem); 
        }

        .wedding-date {
            border-top: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
            padding: 5px 20px;
            font-size: 1rem;
            display: inline-block;
            letter-spacing: 3px;
            color: #ffffff;
            margin-top: 10px;
        }

        /* --- PHẦN 2: GIỚI THIỆU CÔ DÂU CHÚ RỂ (NỀN XANH RÊU) --- */
        .couple-intro {
            background-color: var(--moss-green);
            padding: 100px 20px;
            text-align: center;
            color: #ffffff;
            position: relative; /* Quan trọng để hoa căn theo khung này */
            overflow: hidden; /* Cắt phần hoa thừa ra ngoài khung */
        }

        /* TRANG TRÍ HOA */
        .flower-decor {
            position: absolute;
            width: 300px; /* Độ lớn của hoa */
            opacity: 0.6; /* Làm mờ hoa để chìm vào nền như mẫu */
            z-index: 1;
            pointer-events: none; /* Để hoa không che mất nút hay link */
        }

        .flower-top-right {
            top: -20px;
            right: -50px;
            transform: rotate(15deg); /* Xoay nhẹ cho tự nhiên */
        }

        .flower-bottom-left {
            bottom: -50px;
            left: -50px;
            transform: rotate(190deg); /* Xoay ngược lại cho góc đối xứng */
        }

        .intro-quote {
            position: relative;
            z-index: 2; /* Để chữ nằm trên hoa */
            margin-bottom: 60px;
        }

        .intro-quote h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .line {
            width: 1px; height: 60px;
            background-color: rgba(255,255,255,0.4);
            margin: 20px auto;
        }

        .couple-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .person-card {
            position: relative;
            border-radius: 30px; 
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
