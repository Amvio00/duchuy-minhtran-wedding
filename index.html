<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Minh Trân & Đức Huy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fdfaf7;
            --moss-green: #2d3e2d; 
            --metallic-gold: #d4af37; 
            --text-dark: #333;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- PHẦN CHI TIẾT VỚI NỀN HOA CHÌM --- */
        .details-section {
            /* Thay link này bằng link ảnh nền hoa của bạn */
            background: url('https://i.imgur.com/your-flower-bg.jpg') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            padding: 100px 20px;
            text-align: center;
            position: relative;
        }

        /* Lớp phủ mờ nhẹ để chữ dễ đọc trên nền hoa */
        .details-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.4); 
            z-index: 1;
        }

        .details-container {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
        }

        /* FONT CHỮ TÊN CD-CR THEO MẪU */
        .name-display {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            text-transform: uppercase; 
            letter-spacing: 6px; 
            font-weight: 400; 
            color: var(--moss-green);
            margin: 10px 0;
        }

        .ampersand {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: var(--metallic-gold);
            margin: 10px 0;
        }

        /* THẺ SỰ KIỆN BO GÓC TRẮNG */
        .event-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 60px 40px;
            margin-top: 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .event-tag {
            background: var(--moss-green);
            color: white;
            display: inline-block;
            padding: 10px 40px;
            border-radius: 50px;
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .event-info-text {
            color: var(--moss-green);
            line-height: 1.8;
        }

        .event-info-text .date {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .event-info-text .hall {
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 15px;
            display: block;
        }

        .btn-rsvp {
            background: var(--moss-green);
            color: white;
            border: none;
            padding: 18px 60px;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-top: 40px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(45, 62, 45, 0.2);
            transition: 0.3s;
        }

        .btn-rsvp:hover { transform: translateY(-3px); opacity: 0.9; }

        @media (max-width: 600px) {
            .event-card { padding: 40px 20px; }
            .name-display { letter-spacing: 3px; }
        }
    </style>
</head>
<body>

<section class="details-section">
    <div class="details-container">
        
        <!-- Khu vực tên CD-CR -->
        <div data-aos="fade-up">
            <p style="letter-spacing: 3px; font-size: 0.8rem; margin-bottom: 5px;">ÚT NAM</p>
            <div class="name-display">MAI ĐỨC HUY</div>
            
            <div class="ampersand">&</div>
            
            <p style="letter-spacing: 3px; font-size: 0.8rem; margin-bottom: 5px;">ÚT NỮ</p>
            <div class="name-display">NGUYỄN THỊ MINH TRÂN</div>
        </div>

        <!-- Thẻ thông tin nhà hàng -->
        <div class="event-card" data-aos="zoom-in">
            <div class="event-tag">Lễ Tân Hôn</div>
            
            <div class="event-info-text">
                <div class="date">THỨ BẢY, 09 THÁNG 05 NĂM 2026</div>
                <hr style="width: 50px; border: 0.5px solid #ccc; margin: 20px auto;">
                
                <p>Đón khách lúc: 18:00</p>
                <p>Khai tiệc lúc: 19:00</p>
                
                <p style="margin-top: 20px;">Tại: <strong> NHÀ HÀNG PAVILLON TÂN SƠN NHẤT</strong></p>
                <p>202 Đ. Hoàng Văn Thụ, Phường 9, Quận Phú Nhuận, TP. HCM</p>
                <span class="hall">Sảnh PEARL - Tầng 3</span>
            </div>

            <button class="btn-rsvp">XÁC NHẬN THAM DỰ</button>
        </div>
    </div>
</section>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 1000, once: true });
</script>

</body>
</html>
