<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Minh Trân & Đức Huy</title>
    
    
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fdfaf7;
            --moss-green: #2d3e2d; /* Màu xanh rêu sang trọng của phần giới thiệu CD-CR */
            --metallic-gold: #d4af37; 
            --gold-light: #fff3d6;
            --gold-shadow: #8a6d3b;
            --text-dark: #333;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- PHẦN 1: HERO (HÌNH NỀN CÂY CỐI) --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Đẩy nội dung lên trên */
            padding-top: 10vh; /* Khoảng cách từ đỉnh xuống để không chạm mép và không che mặt hai bạn */
            align-items: center;
            text-align: center;
            position: relative;
            background: url('anhnen1.jpg') no-repeat center center/cover;
        }

        /* Lớp phủ nhẹ toàn màn hình giúp chữ trắng dễ đọc hơn */
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.15); 
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 90%; 
        }

        .welcome-text {
            letter-spacing: 4px;
            font-size: 0.8rem;
            color: #ffffff;
            margin-bottom: 5px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        .main-title {
            font-family: 'Great Vibes', cursive;
            color: var(--metallic-gold);
            margin: 5px 0;
            line-height: 1.2;
            /* Hiệu ứng Gold 3D óng ả tinh tế */
            text-shadow: 
                0px 1px 0px var(--gold-light),
                0px 2px 0px var(--gold-shadow),
                1px 4px 6px rgba(0,0,0,0.3);
            /* Tự động co giãn kích thước chữ để vừa mọi màn hình và không mất chữ "y" */
            font-size: clamp(2.2rem, 8vw, 5rem); 
        }

        .wedding-date {
            border-top: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
            padding: 5px 20px;
            font-size: 1rem;
            display: inline-block;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            margin-top: 10px;
        }

        /* --- PHẦN 2: GIỚI THIỆU CÔ DÂU CHÚ RỂ (NỀN XANH RÊU) --- */
        .couple-intro {
            background-color: var(--moss-green);
            padding: 80px 20px;
            text-align: center;
            color: #ffffff;
        }

        .intro-quote {
            margin-bottom: 50px;
        }

        .intro-quote h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
        }

        .line {
            width: 1px;
            height: 60px;
            background-color: rgba(255,255,255,0.5);
            margin: 20px auto;
        }

        .intro-quote p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 300px;
            margin: 0 auto;
        }

        .couple-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 450px;
            margin: 0 auto;
        }

        .person-card {
            position: relative;
            border-radius: 25px; /* Bo góc sang trọng giống mẫu */
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .person-card img {
            width: 100%;
            display: block;
            object-fit: cover;
            height: 550px; /* Cố định chiều cao ảnh để bố cục cân đối */
        }

        .person-info {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 40px 20px 25px;
            /* Lớp gradient mờ ở đáy ảnh để chữ trắng luôn nổi bật */
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            text-align: center;
        }

        .role-text {
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            margin-bottom: -5px;
            color: #ffffff;
        }

        .name-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            color: #ffffff;
        }

        /* --- PHẦN 3: THÔNG TIN LỄ CƯỚI --- */
        .details {
            padding: 80px 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .card {
            background: white;
            padding: 50px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* --- ĐIỀU CHỈNH RIÊNG CHO MOBILE --- */
        @media (max-width: 600px) {
            .hero { padding-top: 8vh; /* Đẩy cụm chữ lên cao hơn trên điện thoại */ }
            .main-title { font-size: 2.2rem; /* Thu nhỏ để không mất chữ "y" trên các màn hình phổ biến */ }
            .wedding-date { font-size: 0.9rem; padding: 5px 15px; }
            .family-grid { grid-template-columns: 1fr; gap: 20px; }
            .couple-grid { max-width: 320px; /* Thu hẹp một chút trên máy nhỏ */ }
            .person-card img { height: 480px; /* Giảm chiều cao ảnh trên mobile */ }
        }

        /* Responsive cho máy tính */
        @media (min-width: 768px) {
            .hero { padding-top: 15vh; }
            .couple-grid { flex-direction: row; max-width: 900px; gap: 50px; }
            .person-card img { height: 620px; /* Tăng chiều cao ảnh trên PC */ }
        }
    </style>
</head>
<body>
