<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Minh Trân & Đức Huy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fdfaf7;
            /* Màu Gold hiệu ứng kim loại */
            --metallic-gold: #d4af37; 
            --gold-light: #fff3d6;
            --gold-shadow: #8a6d3b;
            --text-dark: #333;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- PHẦN HERO: ĐIỀU CHỈNH VỊ TRÍ VÀ MÀU CHỮ --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Đẩy nội dung lên trên */
            padding-top: 12vh; /* Khoảng cách từ đỉnh xuống để không chạm mép */
            align-items: center;
            text-align: center;
            position: relative;
            background: url('anhnen1.jpg') no-repeat center center/cover;
        }

        /* Lớp phủ nhẹ toàn màn hình để chữ dễ đọc hơn mà không cần khung đen */
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.2); 
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 90%; 
        }

        .welcome-text {
            letter-spacing: 4px;
            font-size: 0.8rem;
            color: #ffffff; /* Chữ trắng cho rõ */
            margin-bottom: 5px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .main-title {
            font-family: 'Great Vibes', cursive;
            /* Màu Gold óng ả 3D */
            color: var(--metallic-gold);
            margin: 5px 0;
            line-height: 1.2;
            text-shadow: 
                0px 1px 0px var(--gold-light),
                0px 2px 0px var(--gold-shadow),
                1px 4px 6px rgba(0,0,0,0.3);
            /* Tự động điều chỉnh kích thước chữ */
            font-size: clamp(2.2rem, 8vw, 5rem); 
        }

        .wedding-date {
            border-top: 1px solid #ffffff;
            border-bottom: 1px solid #ffffff;
            padding: 5px 20px;
            font-size: 1rem;
            display: inline-block;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            margin-top: 10px;
        }

        /* --- ĐIỀU CHỈNH RIÊNG CHO MOBILE --- */
        @media (max-width: 600px) {
            .hero {
                padding-top: 8vh; /* Đẩy cụm chữ lên cao hơn trên điện thoại */
            }
            .main-title {
                font-size: 2.2rem; /* Thu nhỏ để không mất chữ 'y' */
                white-space: normal; /* Cho phép xuống dòng nếu tên quá dài */
            }
            .welcome-text {
                letter-spacing: 2px;
                font-size: 0.7rem;
            }
            .wedding-date {
                font-size: 0.9rem;
                padding: 5px 15px;
            }
        }

        /* Các phần còn lại giữ nguyên thiết kế cũ */
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 10; }
        .section-card { background: white; padding: 40px 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; margin-bottom: 40px; }
        .family-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        @media (max-width: 600px) { .family-grid { grid-template-columns: 1fr; } }
        .photo-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .photo-item { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-content" data-aos="fade-up">
            <p class="welcome-text">WELCOME TO OUR WEDDING</p>
            <h1 class="main-title">Minh Trân & Đức Huy</h1>
            <div class="wedding-date">09 . 05 . 2026</div>
        </div>
    </section>

    <div class="container">
        <!-- Nội dung thiệp dưới đây bạn giữ nguyên như cũ -->
        <div class="section-card" data-aos="fade-up">
            <h2 style="font-family: 'Playfair Display';">Lễ Thành Hôn</h2>
            <p>18:00 | Thứ Bảy, 09.05.2026</p>
            <p>Pavillon Tân Sơn Nhất</p>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
