<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Đức Huy & Minh Trân</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fdfaf7;
            --moss-green: #2d3e2d; 
            --metallic-gold: #d4af37; 
            --gold-light: #fff3d6;
            --gold-shadow: #8a6d3b;
            --text-dark: #333;
            --primary-dark: #7a2b2d;
            --glass-white: rgba(255, 255, 255, 0.7); 
            --gold-line: #c4a484;
        }

        body, html { margin: 0; padding: 0; background-color: var(--bg-color); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        /* --- MÀN HÌNH CHÀO (OVERLAY) --- */
        #wedding-overlay {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 2000;
            background: url('anhbia.jpg') no-repeat center center/cover;
            transition: opacity 1.2s ease, transform 1.2s ease;
        }
        .main-card { position: relative; width: 85%; max-width: 420px; padding: 8px; border: 1px solid var(--gold-line); border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .glass-content { background: var(--glass-white); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 40px 20px; border-radius: 20px; text-align: center; }
        .overlay-names { font-family: 'Great Vibes', cursive; font-size: 3rem; color: #2d3826; margin: 5px 0; }
        .btn-open { background-color: var(--primary-dark); color: white; border: none; padding: 12px 40px; border-radius: 30px; font-size: 1rem; cursor: pointer; font-weight: bold; margin-top: 15px; }

        /* --- NỘI DUNG CHÍNH --- */
        #main-invitation { display: none; opacity: 0; }
        .stage-exit { opacity: 0 !important; transform: scale(1.05) !important; pointer-events: none; }
        .stage-enter { opacity: 1 !important; display: block !important; }

        /* Hero Section */
        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            background: url('anhnen1.webp') no-repeat center center/cover; position: relative;
        }
        .hero::before { content: ''; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.25); }
        .hero-content { position: relative; z-index: 2; color: #fff; }
        .main-title { font-family: 'Great Vibes', cursive; color: var(--metallic-gold); font-size: clamp(3rem, 10vw, 5rem); margin: 10px 0; }

        /* Couple Section - Đã sửa lỗi song song và hình hoa */
        .couple-intro { 
            background-color: var(--moss-green); padding: 100px 20px; text-align: center; color: #ffffff; 
            position: relative; overflow: hidden;
        }
        .flower-decor { position: absolute; width: 300px; opacity: 0.6; z-index: 1; pointer-events: none; display: block !important; }
        .flower-1 { top: -20px; right: -50px; }
        .flower-2 { bottom: -20px; left: -50px; transform: scaleX(-1); }
        
        .couple-grid { 
            display: flex; flex-direction: row; justify-content: center; align-items: center; 
            gap: 30px; max-width: 1000px; margin: 50px auto 0; position: relative; z-index: 5;
        }
        .person-card { flex: 1; max-width: 400px; position: relative; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .person-card img { width: 100%; height: auto; display: block; object-fit: cover; }
        .person-info { position: absolute; bottom: 0; width: 100%; padding: 30px 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }
        .role-text-card { font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: var(--metallic-gold); }
        .name-text-card { font-family: 'Playfair Display', serif; font-size: 1.2rem; letter-spacing: 2px; }

        /* Responsive cho Mobile: 2 hình chồng lên nhau nếu màn hình quá nhỏ */
        @media (max-width: 768px) {
            .couple-grid { flex-direction: column; gap: 40px; }
            .person-card { width: 90%; }
            .flower-decor { width: 200px; }
        }

        /* Các thành phần khác giữ nguyên */
        .details-section { background: url('image_21.png') repeat; padding: 80px 15px; text-align: center; color: var(--moss-green); }
        #petal-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9998; }
        .btn-rsvp { background: var(--moss-green); color: white; border: none; padding: 16px 45px; border-radius: 50px; cursor: pointer; margin-top: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="petal-canvas"></canvas>
    <audio id="weddingMusic" loop></audio>

    <!-- OVERLAY -->
    <div id="wedding-overlay">
        <div class="main-card">
            <div class="glass-content">
                <p style="letter-spacing: 3px; font-size: 0.7rem;">WEDDING INVITATION</p>
                <div class="overlay-names">Đức Huy</div>
                <div style="font-family: 'Great Vibes'; font-size: 1.5rem; color: var(--gold-line);">&</div>
                <div class="overlay-names">Minh Trân</div>
                <p style="margin: 15px 0;">09 . 05 . 2026</p>
                <div id="guest-name-overlay" style="background: rgba(122, 43, 45, 0.1); padding: 8px 20px; border-radius: 20px; font-weight: 600;">Quý Khách</div>
                <br>
                <button class="btn-open" onclick="openWedding()">Mở thiệp</button>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main-invitation">
        <section class="hero">
            <div class="hero-content" data-aos="fade-up">
                <p>WELCOME TO OUR WEDDING</p>
                <h1 class="main-title">Đức Huy & Minh Trân</h1>
                <p style="letter-spacing: 5px;">09 . 05 . 2026</p>
            </div>
        </section>

        <section class="couple-intro">
            <!-- Hình hoa góc -->
            <img src="hình_hoa_1.png" class="flower-decor flower-1" alt="decor">
            <img src="hình_hoa_2.png" class="flower-decor flower-2" alt="decor">
            
            <div class="intro-quote" data-aos="fade-up">
                <h2 style="font-family: 'Playfair Display'; font-size: 2rem;">WHEN TWO HEARTS<br>BEAT AS ONE</h2>
                <p style="font-style: italic; opacity: 0.8; margin-top: 20px;">They create a soul strong enough to last forever!</p>
            </div>

            <!-- Grid 2 người song song -->
            <div class="couple-grid">
                <div class="person-card" data-aos="fade-right">
                    <img src="anh_chu_re.webp" alt="Chú rể">
                    <div class="person-info">
                        <div class="role-text-card">Chú rể</div>
                        <div class="name-text-card">ĐỨC HUY</div>
                    </div>
                </div>
                <div class="person-card" data-aos="fade-left">
                    <img src="anh_co_dau.webp" alt="Cô dâu">
                    <div class="person-info">
                        <div class="role-text-card">Cô dâu</div>
                        <div class="name-text-card">MINH TRÂN</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Thêm các section khác (Details, Album, Guestbook) của Code 2 vào đây tương tự... -->
        <section class="details-section">
             <div id="guest-name" style="font-size: 1.8rem; font-weight: 700; border-bottom: 2px solid var(--metallic-gold); display: inline-block; margin-bottom: 30px;">Quý Khách</div>
             <h3>PAVILLON TÂN SƠN NHẤT</h3>
             <p>Sảnh: PEARL - Tầng 3</p>
             <button class="btn-rsvp" onclick="alert('Tính năng RSVP đang mở...')">XÁC NHẬN THAM DỰ</button>
        </section>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

       function openWedding() {
    const audio = document.getElementById('weddingMusic');
    const overlay = document.getElementById('wedding-overlay');
    const main = document.getElementById('main-invitation');
    
    // 1. Load nhạc ngay lập tức
    const playlist = ['nhac1.mp3', 'nhac2.mp3', 'nhac3.mp3'];
    audio.src = playlist[Math.floor(Math.random() * playlist.length)];
    audio.play().catch(() => console.log("Music waiting for interaction"));

    // 2. Hiệu ứng biến mất màn hình chào (dùng opacity thay vì scale để tránh giật)
    overlay.style.transition = "opacity 0.8s ease-out";
    overlay.style.opacity = "0";
    
    // 3. Hiển thị khung nội dung chính (chuẩn bị sẵn để hiện lên)
    main.style.display = "block";
    main.style.opacity = "0";

    setTimeout(() => {
        overlay.style.display = "none";
        
        // 4. Fade-in nội dung chính mượt mà
        main.style.transition = "opacity 1.2s ease-in";
        main.style.opacity = "1";
        
        // Cho phép cuộn trang
        document.body.style.overflow = "auto";
        
        // 5. Đợi một chút cho hiệu ứng Fade-in chạy rồi mới cuộn
        setTimeout(() => {
            window.scrollTo({
                top: window.innerHeight * 0.6, // Cuộn xuống vừa phải để thấy hình cô dâu chú rể
                behavior: 'smooth'
            });
            AOS.refresh(); // Kích hoạt hiệu ứng bay ra của các thành phần
        }, 500);

    }, 800);
}

        // Cánh hoa rơi
        const canvas = document.getElementById('petal-canvas');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth, h = canvas.height = window.innerHeight;
        let petals = Array.from({length: 30}, () => ({
            x: Math.random() * w, y: Math.random() * h, s: Math.random() * 5 + 2, r: Math.random() * 10
        }));
        function draw() {
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = 'rgba(255, 182, 193, 0.6)';
            petals.forEach(p => {
                p.y += p.s; p.r += 0.02;
                if (p.y > h) p.y = -10;
                ctx.beginPath();
                ctx.ellipse(p.x + Math.sin(p.r) * 10, p.y, p.s, p.s/1.5, p.r, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        // Tên khách
        const name = new URLSearchParams(window.location.search).get('guest');
        if(name) {
            document.getElementById('guest-name-overlay').innerText = decodeURIComponent(name);
            document.getElementById('guest-name').innerText = decodeURIComponent(name);
        }
    </script>
</body>
</html>
