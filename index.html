<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Đức Huy & Minh Trân</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fdfaf7;
            --moss-green: #2d3e2d; 
            --metallic-gold: #d4af37; 
            --gold-light: #fff3d6;
            --gold-shadow: #8a6d3b;
            --text-dark: #333;
            --calendar-green: #78a55a;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* --- GIỮ NGUYÊN CÁC PHẦN TRÊN --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            padding-top: 10vh;
            align-items: center;
            text-align: center;
            position: relative;
            background: url('anhnen1.webp') no-repeat center center/cover;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.2); 
            z-index: 1;
        }
        .hero-content { position: relative; z-index: 2; width: 95%; } 
        .welcome-text { letter-spacing: 4px; font-size: 0.8rem; color: #ffffff; margin-bottom: 5px; text-transform: uppercase; }
        
        .main-title {
            font-family: 'Great Vibes', cursive;
            color: var(--metallic-gold);
            margin: 5px 0;
            line-height: 1.2;
            text-shadow: 0px 1px 0px var(--gold-light), 0px 2px 0px var(--gold-shadow), 1px 4px 6px rgba(0,0,0,0.3);
            font-size: clamp(2.2rem, 9vw, 5rem); 
            white-space: nowrap; 
        }

        .wedding-date { border-top: 1px solid #ffffff; border-bottom: 1px solid #ffffff; padding: 5px 20px; font-size: 1rem; display: inline-block; letter-spacing: 3px; color: #ffffff; margin-top: 10px; }

        .couple-intro {
            background-color: var(--moss-green);
            padding: 100px 20px;
            text-align: center;
            color: #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .flower-decor { position: absolute; width: 350px; opacity: 0.3; z-index: 1; pointer-events: none; }
        .flower-1 { top: -50px; right: -80px; transform: rotate(10deg); }
        .flower-2 { bottom: -50px; left: -80px; transform: rotate(190deg); }
        
        .intro-quote { position: relative; z-index: 2; margin-bottom: 60px; width: 100%; }
        .intro-quote h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .line { width: 1px; height: 60px; background-color: rgba(255,255,255,0.3); margin: 20px auto; }
        
        .couple-grid { 
            position: relative; z-index: 2; display: flex; flex-direction: column; gap: 40px; 
            width: 100%; max-width: 450px; margin: 0 auto; align-items: center; 
        }
