<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Minh Trân & Đức Huy</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fdfaf7;
            --moss-green: #2d3e2d; 
            --metallic-gold: #d4af37; 
            --gold-light: #fff3d6;
            --gold-shadow: #8a6d3b;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            width: 100%;
        }

        /* --- SECTION 1: HERO (HÌNH NỀN CÂY CỐI) --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            padding-top: 12vh;
            align-items: center;
            text-align: center;
            position: relative;
            background: url('anhnen1.jpg') no-repeat center center/cover;
            background-attachment: scroll;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.2); 
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 90%; 
        }

        .main-title {
            font-family: 'Great Vibes', cursive;
            color: var(--metallic-gold);
            margin: 10px 0;
            line-height: 1.2;
            text-shadow: 0px 1px 0px var(--gold-light), 0px 2px 0px var(--gold-shadow), 1px 4px 6px rgba(0,0,0,0.3);
            font-size: clamp(2.5rem, 10vw, 5rem); 
        }

        /* --- SECTION 2: GIỚI THIỆU CD-CR (XANH RÊU) --- */
        .couple-intro {
            background-color: var(--moss-green);
            padding: 100px 20px;
            text-align: center;
            color: #ffffff;
            position: relative;
            overflow: hidden; /* Để không bị tràn hoa ra ngoài */
        }

        /* Hình hoa trang trí góc */
        .flower-decor {
            position: absolute;
            width: 250px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.8;
        }
        .flower-1 { top: -10px; left: -10px; }
        .flower-2 { bottom: -10px; right: -10px; transform: rotate(180deg); }

        .intro-quote {
            position: relative;
            z-index: 2;
            margin-bottom: 50px;
        }

        .line {
            width: 1px; height: 50px;
            background-color: rgba(255,255,255,0.3);
            margin: 20px auto;
        }

        .couple-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .person-card {
            position: relative;
            border-radius: 25px; 
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            background: #3a4d3a; /* Nền dự phòng nếu ảnh lỗi */
        }

        .person-card img {
            width: 100%;
            display: block;
            object-fit: cover;
            height: 500px;
        }
