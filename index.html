<!DOCTYPE html> 
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation | Minh Trân & Đức Huy</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #fdfaf7;
    --green: #2d3e2d;
    --gold: #d4af37;
}

/* ===== BODY ===== */
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: var(--bg-color);
}

/* ===== HERO ===== */
.hero {
    height: 100vh;
    background: url('anhnen1.jpg') center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-family: 'Great Vibes';
    font-size: 4rem;
    color: var(--gold);
}

.hero p {
    color: white;
    letter-spacing: 3px;
}

/* ===== COUPLE ===== */
.couple {
    background: var(--green);
    color: white;
    text-align: center;
    padding: 80px 20px;
}

.couple h2 {
    font-family: 'Playfair Display';
    letter-spacing: 2px;
}

.couple-grid {
    display: flex;
    flex-direction: column;
    gap: 30px;
    margin-top: 40px;
}

.person img {
    width: 100%;
    max-width: 300px;
    border-radius: 20px;
}

/* ===== DETAILS ===== */
.details-section {
    background: url('image_21.jpg') repeat;
    padding: 80px 20px;
    text-align: center;
    color: var(--green);
}

/* TITLE */
.section-title {
    font-family: 'Playfair Display';
    letter-spacing: 5px;
    font-size: 0.9rem;
    margin-bottom: 25px;
    position: relative;
    display: inline-block;
}

.section-title::before,
.section-title::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 50px;
    height: 1px;
    background: rgba(0,0,0,0.2);
}

.section-title::before { left: -60px; }
.section-title::after { right: -60px; }

/* BOX */
.event-info {
    background: rgba(255,255,255,0.35);
    padding: 40px 20px;
    max-width: 600px;
    margin: auto;
}

/* DATE */
.date {
    font-family: 'Playfair Display';
    font-size: 1.3rem;
    letter-spacing: 2px;
}

.lunar {
    font-style: italic;
    margin: 10px 0 20px;
}

/* TIME */
.timeline {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin: 30px 0;
}

.time-block {
    text-align: center;
}

.divider {
    width: 1px;
    background: rgba(0,0,0,0.2);
}

/* LOCATION */
.location {
    line-height: 1.8;
}

/* BUTTON */
.btn {
    margin-top: 30px;
    padding: 15px 40px;
    background: var(--green);
    color: white;
    border-radius: 50px;
    border: none;
}

/* RESPONSIVE */
@media(min-width:768px){
    .couple-grid{
        flex-direction: row;
        justify-content: center;
    }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div>
        <p>WELCOME TO OUR WEDDING</p>
        <h1>Minh Trân & Đức Huy</h1>
    </div>
</section>

<!-- COUPLE -->
<section class="couple">
    <h2>When Two Hearts Beat As One</h2>

    <div class="couple-grid">
        <div class="person">
            <img src="anh_chu_re.jpg">
            <p>ĐỨC HUY</p>
        </div>

        <div class="person">
            <img src="anh_co_dau.jpg">
            <p>MINH TRÂN</p>
        </div>
    </div>
</section>

<!-- DETAILS -->
<section class="details-section">

    <!-- 👇 NẰM NGOÀI -->
    <div class="section-title">LỄ TÂN HÔN</div>

    <div class="event-info">

        <div class="date">
            THỨ BẢY, 09 THÁNG 05 NĂM 2026
        </div>

        <div class="lunar">
            (Tức ngày 23/03 Bính Ngọ)
        </div>

        <div class="timeline">
            <div class="time-block">
                <div>ĐÓN KHÁCH</div>
                <div><b>17:30</b></div>
            </div>

            <div class="divider"></div>

            <div class="time-block">
                <div>KHAI TIỆC</div>
                <div><b>18:30</b></div>
            </div>
        </div>

        <div class="location">
            Tại Nhà hàng: <b>PAVILLON TÂN SƠN NHẤT</b><br>
            202 Hoàng Văn Thụ, Phú Nhuận<br>
            <b>Sảnh PEARL - Tầng 3</b>
        </div>

        <button class="btn">XÁC NHẬN THAM DỰ</button>

    </div>

</section>

</body>
</html>
