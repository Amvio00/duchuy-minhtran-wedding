    <style>
        :root {
            --bg-color: #fdfaf7;
            --moss-green: #2d3e2d; 
            --metallic-gold: #d4af37; 
            --gold-light: #fff3d6;
            --gold-shadow: #8a6d3b;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* --- PHẦN 1: HERO (HÌNH NỀN CÂY CỐI) --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            padding-top: 10vh;
            align-items: center;
            text-align: center;
            position: relative;
            background: url('anhnen1.jpg') no-repeat center center/cover;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.15); 
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 90%; 
        }

        .main-title {
            font-family: 'Great Vibes', cursive;
            color: var(--metallic-gold);
            margin: 5px 0;
            line-height: 1.2;
            text-shadow: 0px 1px 0px var(--gold-light), 0px 2px 0px var(--gold-shadow), 1px 4px 6px rgba(0,0,0,0.3);
            font-size: clamp(2.5rem, 8vw, 5rem); 
        }

        /* --- PHẦN 2: GIỚI THIỆU CÔ DÂU CHÚ RỂ (NỀN XANH RÊU) --- */

            background-color: var(--moss-green);
            padding: 100px 20px;
            text-align: center;
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }

            opacity: 0.6;

            pointer-events: none;
